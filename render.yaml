services:
  - type: web
    name: nutriperformance-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        sync: false
      - key: CPF_SALT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_SSL
        sync: false
      - key: DB_SYNC
        sync: false
      - key: DB_USER
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_EXPIRY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
